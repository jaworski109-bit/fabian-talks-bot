name: Run Fabian Bot

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install feedparser

      - name: Create output folder
        run: mkdir -p output

      - name: Run bot
        run: python fabian_bot.py

      - name: Commit output
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add output/*
          git commit -m "update topics" || echo "no changes"
          git push
